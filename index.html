<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, initial-scale=1.0">
    <title>Estakada 99</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="skyGradient"></div>
    <img id="logo" src="images/logo.png" alt="Estakada 99">
    <div id="status">Connecting...</div>
    <button id="playPauseBtn">&#9654;</button>
    <div id="nowPlaying" class="hidden">
        <div id="showName" class="hidden"></div>
        <div id="nowPlayingLabel">Currently playing:</div>
        <div id="nowPlayingTrack"></div>
    </div>
    <div id="clock"></div>
    <audio id="audioPlayer" preload="auto"></audio>
    <script src="js/app.js"></script>
</body>
</html>
